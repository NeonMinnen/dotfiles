#TERM: 
alacritty window:
  dimensions:
    columns: 133
    lines: 50
# The value `0.0` is completely transparent and `1.0` is opaque.
opacity: 1.0
#scrolling:
# Maximum number of lines in the scrollback buffer. Specifying '0' will disable scrolling.
#history: 10000
# Scrolling distance multiplier. multiplier: 5
# Font configuration
font:
  normal:
    family: "JetBrains Mono"
    style: Normal
  bold:
    family: "JetBrains Mono"
    style: Bold
  italic:
    family: "JetBrains Mono"
    style: Italic
  bold_italic:
    family: "JetBrains Mono"
    style: Bold Italic
  size: 11.0

  draw_bold_text_with_bright_colors: true

  # - `mods` (see key bindings)
  mouse_bindings:
    #  - { mouse: Right,                 action: ExpandSelection }
    #  - { mouse: Right,  mods: Control, action: ExpandSelection }
    - { mouse: Middle, action: PasteSelection }
    - { key: V, mods: Control|Shift, action: Paste }
    - { key: C, mods: Control|Shift, action: Copy }
  # Key bindings
# Base16 Grayscale Dark 256 - alacritty color config
# Alexandre Gavioli (https://github.com/Alexx2/)
colors:
  name: Chalk (dark)
  author: Chris Kempson
  primary:
    background: "#151515"
    foreground: "#d0d0d0"
  cursor:
    text: "#151515"
    cursor: "#d0d0d0"
  normal:
    black: "#151515"
    red: "#fb9fb1"
    green: "#acc267"
    yellow: "#ddb26f"
    blue: "#6fc2ef"
    magenta: "#e1a3ee"
    cyan: "#12cfc0"
    white: "#d0d0d0"
  bright:
    black: "#505050"
    red: "#fb9fb1"
    green: "#acc267"
    yellow: "#ddb26f"
    blue: "#6fc2ef"
    magenta: "#e1a3ee"
    cyan: "#12cfc0"
    white: "#f5f5f5"
theme: Chalk.dark
