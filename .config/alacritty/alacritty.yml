#TERM: 
alacritty window:
   dimensions:
     columns: 133
     lines: 50
  # The value `0.0` is completely transparent and `1.0` is opaque.
opacity: 1.0
  #scrolling:
  # Maximum number of lines in the scrollback buffer. Specifying '0' will disable scrolling.
  #history: 10000
  # Scrolling distance multiplier. multiplier: 5

# Font configuration
font:
  normal:
    family: "JetBrains Mono"
    style: Normal
  bold:
    family: "JetBrains Mono"
    style: Bold
  italic:
    family: "JetBrains Mono"
    style: Italic
  bold_italic:
    family: "JetBrains Mono"
    style: Bold Italic
  size: 11.0


  draw_bold_text_with_bright_colors: true

  #
  # - `mods` (see key bindings)
  mouse_bindings:
    #  - { mouse: Right,                 action: ExpandSelection }
    #  - { mouse: Right,  mods: Control, action: ExpandSelection }
    - { mouse: Middle, action: PasteSelection }
    - { key: V,      mods: Control|Shift,                  action: Paste             }
    - { key: C,      mods: Control|Shift,                  action: Copy              }
  # Key bindings
# Colors (Solarized Dark)
colors:
  # Default colors
  primary:
    background: '0x002b36'
    foreground: '0x839496'

  # Normal colors
  normal:
    black:   '0x073642'
    red:     '0xdc322f'
    green:   '0x859900'
    yellow:  '0xb58900'
    blue:    '0x268bd2'
    magenta: '0xd33682'
    cyan:    '0x2aa198'
    white:   '0xeee8d5'

  # Bright colors
  bright:
    black:   '0x002b36'
    red:     '0xcb4b16'
    green:   '0x586e75'
    yellow:  '0x657b83'
    blue:    '0x839496'
    magenta: '0x6c71c4'
    cyan:    '0x93a1a1'
    white:   '0xfdf6e3'

